# events is required, but defaults are ok
events {}

# A http server, listening at port 80
http {
  server {
    listen 80;

    # Requests starting with root (/) are handled
    location / {
      # These headers are harmless here, but the important production detail is that this proxies to the
      # frontend container's Nginx server, not to a Vite dev server on port 5173.
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection 'upgrade';

      # Requests are directed to the static frontend container
      proxy_pass http://app:80;
    }

    # Requests starting with /api/ are handled
    location /api/ {
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection 'upgrade';

      proxy_pass http://api:3003/api/;  # DO NOT MISS THE TRAILING SLASH!!
    }
  }
}
